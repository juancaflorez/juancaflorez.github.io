# Project Info
site_name: Environment Technical Art
site_author: Juan Florez
copyright: Copyright &copy; 2023 Juan Florez

# Site Config
use_directory_urls: true

# Theme
theme:
  name: material
  features:
    - navigation.top
    - navigation.indexes
    - navigation.sections
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - toc.follow
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    logo: fontawesome/solid/seedling

plugins:
  - tags
  - search
  - awesome-pages:
      collapse_single_pages: false


extra:
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

    cookies:
      analytics:
        name: Google Analytics
        checked: false

  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/juancaflorez/
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/juancaflorez/


extra_css:
  - css/neoteroi.css

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      extend_pygments_lang:
        - name: ue5
          lang: cpp
        - name: vex
          lang: glsl
        - name: hscript
          lang: glsl

  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - admonition
  - neoteroi.cards

